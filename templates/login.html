<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProposeAI — The Future of Proposals</title>
    <link rel="icon" type="image/png" href="/static/images/titlelogo.png">
    <meta name="description"
        content="Log in or create your ProposeAI account to start generating premium proposals in seconds.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-primary: #050505;
            --bg-secondary: #0a0a0a;
            --fg-primary: #f5f5f5;
            --fg-secondary: #a3a3a3;
            --fg-muted: #525252;
            --accent: #00d4aa;
            --accent-secondary: #00b894;
            --accent-glow: rgba(0, 212, 170, 0.35);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-hover: rgba(255, 255, 255, 0.15);
            --error: #ef4444;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--fg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background orbs */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            animation: floatOrb 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #00d4aa, transparent 70%);
            top: -150px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #0066ff, transparent 70%);
            bottom: -150px;
            left: -100px;
            animation-delay: -7s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #8b5cf6, transparent 70%);
            top: 40%;
            left: 40%;
            opacity: 0.2;
            animation-delay: -14s;
        }

        @keyframes floatOrb {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -40px) scale(1.05);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.95);
            }
        }

        .grid-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background-image: linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* ===== MAIN CARD ===== */
        .auth-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            padding: 24px;
        }

        .logo-link {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--fg-primary);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            justify-content: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .auth-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== TABS ===== */
        .tabs {
            display: flex;
            gap: 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 4px;
            margin-bottom: 32px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            border-radius: 7px;
            color: var(--fg-muted);
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            color: #050505;
        }

        /* ===== FORMS ===== */
        .form-panel {
            display: none;
        }

        .form-panel.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .form-heading {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .form-subheading {
            font-size: 0.875rem;
            color: var(--fg-secondary);
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--fg-secondary);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            color: var(--fg-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: var(--fg-muted);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 212, 170, 0.03);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .error-msg {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 6px;
            display: none;
        }

        .error-msg.visible {
            display: block;
        }

        .global-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            color: var(--error);
            font-size: 0.875rem;
            margin-bottom: 20px;
            display: none;
        }

        .global-error.visible {
            display: block;
        }

        /* ===== SUBMIT BUTTON ===== */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border: none;
            border-radius: var(--radius-sm);
            color: #050505;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transition: left 0.5s ease;
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            pointer-events: none;
        }

        .btn-spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-submit.loading .btn-spinner {
            display: block;
        }

        .btn-submit.loading .btn-text {
            display: none;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            font-size: 0.8rem;
            color: var(--fg-muted);
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: calc(50% - 24px);
            height: 1px;
            background: var(--glass-border);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 0.8rem;
            color: var(--fg-muted);
        }

        .footer-note a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="bg-canvas" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="grid-pattern" aria-hidden="true"></div>

    <div class="auth-wrapper">
        <!-- Logo -->
        <a href="/" class="logo-link">
            <div class="logo-icon">
                <img src="/static/images/logo.png" alt="ProposeAI Logo"
                    style="width:100%; height:100%; object-fit:contain; border-radius:4px;">
            </div>
            ProposeAI
        </a>

        <div class="auth-card">
            <!-- Tab Switcher -->
            <div class="tabs" role="tablist">
                <button class="tab-btn active" id="tab-login" role="tab" aria-selected="true"
                    onclick="switchTab('login')">Log In</button>
                <button class="tab-btn" id="tab-register" role="tab" aria-selected="false"
                    onclick="switchTab('register')">Sign Up Free</button>
            </div>

            <!-- Global Error -->
            <div class="global-error" id="globalError" role="alert"></div>

            <!-- ===== LOGIN FORM ===== -->
            <div class="form-panel active" id="panel-login">
                <h1 class="form-heading">Welcome back</h1>
                <p class="form-subheading">Log in to generate and manage your proposals.</p>

                <form id="loginForm" novalidate>
                    <div class="form-group">
                        <label for="loginEmail">Email Address</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"
                            required>
                    </div>
                    <button type="submit" class="btn-submit" id="loginBtn">
                        <span class="btn-spinner" aria-hidden="true"></span>
                        <span class="btn-text">Log In</span>
                    </button>
                </form>

                <p class="footer-note">
                    No account? <a href="#" onclick="switchTab('register'); return false;">Sign up free</a>
                </p>
            </div>

            <!-- ===== REGISTER FORM ===== -->
            <div class="form-panel" id="panel-register">
                <h1 class="form-heading">Create your account</h1>
                <p class="form-subheading">Start generating premium proposals for free. No credit card required.</p>

                <form id="registerForm" novalidate>
                    <div class="form-group">
                        <label for="regName">Full Name</label>
                        <input type="text" id="regName" placeholder="Your Name" autocomplete="name" required>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email Address</label>
                        <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email" required>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <input type="password" id="regPassword" placeholder="Min. 6 characters"
                            autocomplete="new-password" required>
                    </div>
                    <button type="submit" class="btn-submit" id="registerBtn">
                        <span class="btn-spinner" aria-hidden="true"></span>
                        <span class="btn-text">Create Account — It's Free</span>
                    </button>
                </form>

                <p class="footer-note">
                    Already have an account? <a href="#" onclick="switchTab('login'); return false;">Log in</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('panel-login').classList.toggle('active', tab === 'login');
            document.getElementById('panel-register').classList.toggle('active', tab === 'register');
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            document.getElementById('tab-login').setAttribute('aria-selected', tab === 'login');
            document.getElementById('tab-register').setAttribute('aria-selected', tab === 'register');
            clearError();
        }

        function showError(msg) {
            const el = document.getElementById('globalError');
            el.textContent = msg;
            el.classList.add('visible');
        }

        function clearError() {
            const el = document.getElementById('globalError');
            el.textContent = '';
            el.classList.remove('visible');
        }

        function setLoading(btn, state) {
            btn.disabled = state;
            btn.classList.toggle('loading', state);
        }

        async function postJSON(url, body) {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            return res.json();
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) { showError('Please fill in all fields.'); return; }
            setLoading(btn, true);
            try {
                const data = await postJSON('/api/login', { email, password });
                if (data.success) {
                    window.location.href = data.redirect || '/';
                } else {
                    showError(data.error || 'Login failed.');
                }
            } catch (err) {
                showError('Network error. Please try again.');
            } finally {
                setLoading(btn, false);
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();
            const btn = document.getElementById('registerBtn');
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
            if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }
            setLoading(btn, true);
            try {
                const data = await postJSON('/api/register', { name, email, password });
                if (data.success) {
                    window.location.href = data.redirect || '/';
                } else {
                    showError(data.error || 'Registration failed.');
                }
            } catch (err) {
                showError('Network error. Please try again.');
            } finally {
                setLoading(btn, false);
            }
        });
    </script>
</body>

</html>
